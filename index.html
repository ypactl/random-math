<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1 id="math" style="text-align: center;">Shouldn't have an error, right? 2<sup>4<sup>1</sup>1</sup></h1>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      alert("Message: " + message + "\n" + "Line: " + lineno + "Col: " + colno)
      return false
    }
    let h = 0
    function rng() {
      return Math.floor(1/Math.random())*10-Math.floor(Math.random()*10)
    }
    function as() {
      h++
      let t = ""
      let a = ".".repeat(2 + (Math.random() <Math.E - 2)).split("").map(v => rng())
      while (Math.random() < 1/2) {
        a.push(rng())
      }
      if (Math.random() < 1/2) {
        a[0] = -a[0]
      }
      for (let i = 0; i < a.length; i++) {
        t += "+-*/"[Math.floor(4*Math.random())].repeat(Number(i > 0)) + a[i]
      }
      h--
      return t + " = " + eval(t)
    }
    function load() {document.getElementById("math").innerHTML = as().toString().replaceAll("--", "+")}
    load()
  </script>
</body>
</html>
